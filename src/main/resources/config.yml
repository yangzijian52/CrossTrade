  sell-quantity:
    title: "&0选择上架数量"
  sell-duration:
    title: "&0选择上架时间"
  sell-confirm:
    title: "&0确认上架"
  buy-quantity:
    title: "&0选择购买数量"
  buy-confirm:
    title: "&0确认购买"
  mine:
    title: "&0我的上架 &8| &7第 {page}/{pages} 页"
  mailbox:
    title: "&0待领取物品 &8| &7第 {page}/{pages} 页"
